<!doctype html><html lang=ko><head><meta charset=UTF-8><meta name=viewport content='width=device-width, initial-scale=1'><title>관리자 | 시퀀스 수학</title></head><body><main class=portal><header><a href=../>시퀀스 수학 관리자</a><button id=logout hidden>로그아웃</button></header><section id=login class=panel><h1>관리자 로그인</h1><form id=loginForm><label>전화번호<input id=phone type=tel required></label><label>PIN<input id=pin type=password inputmode=numeric minlength=4 maxlength=6 required></label><button>로그인</button><p id=loginError class=error role=alert></p></form></section><section id=pinChange hidden class=panel><h1>새 PIN 설정</h1><p>관리 기능을 사용하려면 숫자 6자리 PIN으로 변경하세요.</p><form id=pinChangeForm><label>새 PIN<input id=newPin type=password inputmode=numeric minlength=6 maxlength=6 required autocomplete=new-password></label><label>새 PIN 확인<input id=confirmPin type=password inputmode=numeric minlength=6 maxlength=6 required autocomplete=new-password></label><button>PIN 변경</button><p id=pinChangeError class=error role=alert></p></form></section><section id=admin hidden><h1>계정 관리</h1><form id=accountForm class=panel><label>이름<input name=name maxlength=40 required></label><label>전화번호<input name=phone required></label><label>초기 PIN (숫자 6자리)<input name=pin inputmode=numeric minlength=6 maxlength=6 required></label><label>역할<select name=role><option value=student>학생</option><option value=admin>관리자</option></select></label><button>계정 발급</button><p id=accountResult role=status></p></form><h2>사용자 목록</h2><div id=users class=cards></div><h1>과제 만들기</h1><form id=assignmentForm class=panel><label>학생<select id=assignmentStudent name=student_id required></select></label><label>제목<input name=title maxlength=120 required></label><label>설명<textarea name=description></textarea></label><label>마감 (선택)<input name=due_at type=datetime-local></label><label>비공개 첨부 (선택)<input name=attachment type=file></label><button>과제 등록</button><p id=assignmentResult role=status></p></form><h1>과제·제출 현황</h1><div id=workflows class=cards></div></section></main><script type=module src=/src/portal/admin.js></script></body></html>
