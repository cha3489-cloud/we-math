<!doctype html><html lang=ko><head><meta charset=UTF-8><meta name=viewport content='width=device-width, initial-scale=1'><title>학생 포털 | 시퀀스 수학</title></head><body><main class=portal><header><a href=../>시퀀스 수학</a><button id=logout hidden>로그아웃</button></header><section id=login class=panel><h1>학생 포털</h1><p>원장님이 발급한 전화번호와 숫자 6자리 PIN으로 로그인하세요.</p><form id=loginForm><label>학생 전화번호<input id=phone type=tel inputmode=numeric required></label><label>PIN<input id=pin type=password inputmode=numeric minlength=4 maxlength=6 required></label><button>로그인</button><p id=loginError class=error role=alert></p></form></section><section id=pinChange hidden class=panel><h1>새 PIN 설정</h1><p>계속하려면 숫자 6자리 PIN으로 변경하세요.</p><form id=pinChangeForm><label>새 PIN<input id=newPin type=password inputmode=numeric minlength=6 maxlength=6 required autocomplete=new-password></label><label>새 PIN 확인<input id=confirmPin type=password inputmode=numeric minlength=6 maxlength=6 required autocomplete=new-password></label><button>PIN 변경</button><p id=pinChangeError class=error role=alert></p></form></section><section id=dashboard hidden><h1><span id=studentName>학생</span>님의 과제</h1><p id=empty>등록된 과제가 없습니다.</p><div id=assignments class=cards></div></section></main><script type=module src=/src/portal/student.js></script></body></html>
